---
# ============================================================
# Flux v2 — GitRepository Source
# ============================================================
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gitops-repo
  namespace: flux-system
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  interval: 1m
  url: https://github.com/your-org/k8s-gitops-project.git
  ref:
    branch: main
  secretRef:
    name: git-credentials
  ignore: |
    # Ignore CI files
    /.github/
    /ci-cd/
    /docs/
    /scripts/
    *.md

---
# ============================================================
# Flux v2 — HelmRepository Source (for Helm charts)
# ============================================================
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes.github.io/ingress-nginx

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.jetstack.io

---
# ============================================================
# Flux v2 — Kustomization: Infrastructure
# ============================================================
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: gitops-repo
  path: ./infrastructure
  prune: false         # Never auto-prune infra
  wait: true
  healthChecks:
  - apiVersion: apps/v1
    kind: Deployment
    name: ingress-nginx-controller
    namespace: ingress-nginx

---
# ============================================================
# Flux v2 — Kustomization: Apps Production
# Must depend on infrastructure being healthy first
# ============================================================
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-production
  namespace: flux-system
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: gitops-repo
  path: ./apps/backend/overlays/prod
  prune: true
  targetNamespace: production
  dependsOn:
  - name: infrastructure
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: flux-cluster-vars
    - kind: Secret
      name: flux-cluster-secrets
  healthChecks:
  - apiVersion: apps/v1
    kind: Deployment
    name: backend
    namespace: production

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-dev
  namespace: flux-system
spec:
  interval: 2m         # Faster sync in dev
  retryInterval: 30s
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: gitops-repo
  path: ./apps/backend/overlays/dev
  prune: true
  targetNamespace: dev
  dependsOn:
  - name: infrastructure

---
# ============================================================
# Flux v2 — HelmRelease: NGINX Ingress Controller
# ============================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.*"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 1h
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controller:
      replicaCount: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      config:
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"
        use-proxy-protocol: "false"
        ssl-protocols: "TLSv1.2 TLSv1.3"
        ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
      service:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: nlb

---
# ============================================================
# Flux v2 — HelmRelease: cert-manager
# ============================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "1.14.*"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  targetNamespace: cert-manager
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
    replicaCount: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true

---
# ============================================================
# Flux v2 — ImageRepository: Track new image tags
# ============================================================
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: backend
  namespace: flux-system
spec:
  image: ghcr.io/your-org/backend
  interval: 5m
  secretRef:
    name: ghcr-credentials

---
# ============================================================
# Flux v2 — ImagePolicy: Only deploy semantic version tags
# ============================================================
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: backend-semver
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: backend
  policy:
    semver:
      range: ">=1.0.0 <2.0.0"   # Only 1.x releases in production

---
# ============================================================
# Flux v2 — ImageUpdateAutomation: Auto-commit new tags
# ============================================================
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: gitops-repo
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxbot@your-org.com
        name: Flux Bot
      messageTemplate: |
        chore(flux): update {{ .AutomationObject.Name }} image

        Updated images:
        {{ range .Updated.Images -}}
        - {{ .Repository }}:{{ .Tag }}
        {{ end -}}

        [skip ci]
    push:
      branch: main
  update:
    strategy: Setters
    path: ./apps
