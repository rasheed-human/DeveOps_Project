apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: backend-base

resources:
  - deployment.yaml
  - ingress.yaml
  - networkpolicy.yaml

commonLabels:
  app.kubernetes.io/part-of: gitops-demo
  app.kubernetes.io/managed-by: argocd

images:
  - name: ghcr.io/your-org/backend
    newName: ghcr.io/your-org/backend
    newTag: latest
