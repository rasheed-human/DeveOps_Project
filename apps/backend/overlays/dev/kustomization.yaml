apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: backend-dev

namespace: dev

bases:
  - ../../base

images:
  - name: ghcr.io/your-org/backend
    newName: ghcr.io/your-org/backend
    newTag: "latest"

replicas:
  - name: backend
    count: 1

commonLabels:
  environment: dev

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - DB_HOST=postgres-service.dev.svc.cluster.local
      - REDIS_URL=redis://redis-service.dev.svc.cluster.local:6379
      - CORS_ORIGIN=http://localhost:3000,https://dev.example.com

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
    target:
      kind: Deployment
      name: backend
