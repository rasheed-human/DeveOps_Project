---
# ============================================================
# PostgreSQL — StatefulSet
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: gitops-demo
    app.kubernetes.io/managed-by: argocd
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: init-chmod
        image: busybox:1.36
        command: ["sh", "-c", "chmod 700 /var/lib/postgresql/data"]
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        securityContext:
          runAsUser: 0
      containers:
      - name: postgres
        image: postgres:16.2-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_INITDB_ARGS
          value: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
        args:
          - "-c"
          - "max_connections=200"
          - "-c"
          - "shared_buffers=256MB"
          - "-c"
          - "effective_cache_size=768MB"
          - "-c"
          - "maintenance_work_mem=64MB"
          - "-c"
          - "wal_buffers=16MB"
          - "-c"
          - "log_statement=all"
          - "-c"
          - "log_duration=on"
          - "-c"
          - "log_min_duration_statement=1000"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        - name: postgres-conf
          mountPath: /etc/postgresql
          readOnly: true

      # Postgres Exporter sidecar for Prometheus
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - name: metrics
          containerPort: 9187
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATA_SOURCE_NAME
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi

      volumes:
      - name: postgres-init
        configMap:
          name: postgres-init-scripts
          defaultMode: 0755
      - name: postgres-conf
        configMap:
          name: postgres-config

  volumeClaimTemplates:
  - metadata:
      name: postgres-data
      labels:
        app: postgres
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests:
          storage: 20Gi

---
# ============================================================
# PostgreSQL — Services
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app: postgres
  type: ClusterIP
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app: postgres
  clusterIP: None
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres

---
# ============================================================
# PostgreSQL — ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
data:
  POSTGRES_DB: appdb
  postgresql.conf: |
    max_connections = 200
    shared_buffers = 256MB
    effective_cache_size = 768MB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 1310kB
    min_wal_size = 1GB
    max_wal_size = 4GB

---
# ============================================================
# PostgreSQL — Init Scripts ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
data:
  01-init.sql: |
    -- Create extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_stat_statements";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";

    -- Create application schema
    CREATE SCHEMA IF NOT EXISTS app;

    -- Create users table
    CREATE TABLE IF NOT EXISTS app.users (
      id         UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      email      VARCHAR(255) UNIQUE NOT NULL,
      name       VARCHAR(255) NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Create index on email
    CREATE INDEX IF NOT EXISTS idx_users_email ON app.users(email);

    -- Grant permissions
    GRANT USAGE ON SCHEMA app TO appuser;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA app TO appuser;
    GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA app TO appuser;

---
# ============================================================
# PostgreSQL — Backup CronJob
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    app: postgres
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: argocd
spec:
  schedule: "0 2 * * *"   # Daily at 2am UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:16.2-alpine
            command:
            - sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="/backups/postgres_backup_${TIMESTAMP}.sql.gz"
              echo "Starting backup to $BACKUP_FILE"
              pg_dump -h postgres-service -U $POSTGRES_USER $POSTGRES_DB | gzip > $BACKUP_FILE
              echo "Backup complete: $BACKUP_FILE"
              # Remove backups older than 30 days
              find /backups -name "*.sql.gz" -mtime +30 -delete
              echo "Old backups cleaned up"
            env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: postgres-backup-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
