name: 🚀 CI/CD Pipeline — Build, Test, Deploy

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      force_deploy:
        description: 'Force deploy even if tests fail'
        required: false
        type: boolean
        default: false

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Kubernetes manifests repo (can be same or separate)
  GITOPS_REPO: your-org/k8s-gitops-project
  MIN_COVERAGE: 80

jobs:
  # ============================================================
  # Job 1: Code Quality & Security Scanning
  # ============================================================
  quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for SonarQube

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Lint code
        working-directory: backend
        run: |
          npm run lint -- --max-warnings 0
          npm run format:check

      - name: Type check
        working-directory: backend
        run: npm run type-check

      - name: Run SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/nodejs
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Scan dependencies (npm audit)
        working-directory: backend
        run: npm audit --audit-level=high

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================================
  # Job 2: Unit & Integration Tests
  # ============================================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Run database migrations
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
        run: npm run migrate:test

      - name: Run unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
        run: |
          npm run test:unit -- \
            --coverage \
            --coverageReporters=lcov \
            --coverageReporters=text-summary \
            --forceExit

      - name: Run integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
        run: npm run test:integration -- --forceExit

      - name: Check coverage threshold
        working-directory: backend
        run: |
          COVERAGE=$(cat coverage/lcov.info | grep -oP 'LF:\K\d+' | awk '{sum+=$1} END {print sum}')
          echo "Total lines: $COVERAGE"
          # Parse actual coverage % from jest output
          npm run test:coverage-check -- --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/coverage/
            backend/test-results/

  # ============================================================
  # Job 3: Build & Push Docker Image
  # ============================================================
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    permissions:
      contents: read
      packages: write
      id-token: write   # For cosign OIDC signing
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.short-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "short-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Setup QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Backend API
            org.opencontainers.image.description=GitOps Demo Backend Service
            org.opencontainers.image.vendor=Your Org
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ steps.vars.outputs.build-date }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend@${{ steps.build.outputs.digest }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:sha-${{ steps.vars.outputs.short-sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ============================================================
  # Job 4: Update GitOps Manifests
  # ============================================================
  update-manifests:
    name: 📝 Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Setup Git identity
        run: |
          git config user.name "CI Bot"
          git config user.email "ci-bot@your-org.com"

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "overlay=apps/backend/overlays/prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "overlay=apps/backend/overlays/dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "env=staging" >> $GITHUB_OUTPUT
            echo "overlay=apps/backend/overlays/staging" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag in Kustomize overlay
        run: |
          SHORT_SHA="${{ needs.build.outputs.short-sha }}"
          IMAGE_TAG="sha-${SHORT_SHA}"
          OVERLAY_PATH="${{ steps.env.outputs.overlay }}"

          echo "Updating image tag to: $IMAGE_TAG"
          echo "Target overlay: $OVERLAY_PATH"

          cd $OVERLAY_PATH
          kustomize edit set image \
            ghcr.io/your-org/backend:$IMAGE_TAG \
            ghcr.io/${{ env.IMAGE_NAME }}/backend:$IMAGE_TAG

          echo "Updated kustomization.yaml:"
          cat kustomization.yaml

      - name: Commit and push manifest update
        run: |
          SHORT_SHA="${{ needs.build.outputs.short-sha }}"
          ENV="${{ steps.env.outputs.env }}"

          git add .
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(gitops): update backend image to sha-${SHORT_SHA} [${ENV}]

          Source: ${{ github.repository }}@${{ github.sha }}
          Triggered by: ${{ github.actor }}
          Workflow: ${{ github.workflow }}
          Run: ${{ github.run_id }}

          [skip ci]"
            git push origin main
            echo "Manifests updated successfully"
          fi

  # ============================================================
  # Job 5: Deploy to Dev (immediate)
  # ============================================================
  deploy-dev:
    name: 🚀 Deploy to Dev
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: https://dev.example.com
    steps:
      - name: Wait for ArgoCD sync
        run: |
          echo "ArgoCD auto-sync will apply changes from GitOps repo."
          echo "Monitoring sync status..."

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync backend-dev \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 300 \
            --prune

      - name: Verify deployment
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait backend-dev \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --health \
            --timeout 300

  # ============================================================
  # Job 6: Deploy to Staging (manual approval)
  # ============================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync staging
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync backend-staging \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 300

      - name: Run smoke tests against staging
        run: |
          BASE_URL="https://staging.example.com"
          echo "Running smoke tests against $BASE_URL"

          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BASE_URL/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Status: $STATUS"
            exit 1
          fi

          # API version check
          VERSION=$(curl -s $BASE_URL/api/version | jq -r '.version')
          echo "Deployed version: $VERSION"

          echo "✅ All smoke tests passed!"

  # ============================================================
  # Job 7: Deploy to Production (manual approval required)
  # ============================================================
  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production         # Requires reviewer approval in GitHub Environments
      url: https://example.com
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Sync production
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync backend-production \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 600 \
            --strategy hook

      - name: Monitor rollout
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait backend-production \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --health \
            --timeout 600

      - name: Production smoke tests
        run: |
          BASE_URL="https://example.com"
          echo "Running production smoke tests..."

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BASE_URL/api/health)
            if [ "$STATUS" == "200" ]; then
              echo "✅ Smoke test $i passed"
            else
              echo "❌ Smoke test $i failed (status: $STATUS)"
              exit 1
            fi
            sleep 5
          done

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Production deployment succeeded!",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *Production Deploy Succeeded*\n*Repo:* ${{ github.repository }}\n*By:* ${{ github.actor }}\n*SHA:* `${{ github.sha }}`"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production deployment FAILED!",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Production Deploy FAILED*\n*Repo:* ${{ github.repository }}\n*By:* ${{ github.actor }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
